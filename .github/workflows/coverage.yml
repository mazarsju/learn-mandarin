name: Test coverage

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".coveragerc"
      - ".github/workflows/coverage.yml"
      - ".github/scripts/**"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".coveragerc"
      - ".github/workflows/coverage.yml"
      - ".github/scripts/**"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        run: python backend/test_coverage.py

      - name: Generate coverage badges
        run: node .github/scripts/generate-coverage-badges.mjs

      - name: Build coverage site
        run: node .github/scripts/build-coverage-site.mjs

      - name: Add coverage summary
        run: |
          node <<'EOF'
          const frontend = require("./frontend/coverage/coverage-summary.json").total;
          const backend = require("./backend/coverage/coverage-summary.json").total;
          const metrics = ["statements", "branches", "functions", "lines"];

          function table(title, summary) {
            const rows = metrics
              .map((key) => `| ${key} | ${summary[key].pct}% |`)
              .join("\n");
            return [
              `## ${title}`,
              "",
              "| Metric | Coverage |",
              "| --- | --- |",
              rows,
            ].join("\n");
          }

          const markdown = [
            table("Frontend test coverage", frontend),
            "",
            table("Backend test coverage", backend),
            "",
            "- [Coverage home](https://mazarsju.github.io/learn-mandarin/)",
            "- [Frontend HTML report](https://mazarsju.github.io/learn-mandarin/frontend/)",
            "- [Backend HTML report](https://mazarsju.github.io/learn-mandarin/backend/)",
          ].join("\n");

          require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown);
          EOF

      - name: Deploy coverage reports to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: coverage-site
          publish_branch: gh-pages
          commit_message: "chore: update test coverage reports"

      - name: Commit coverage badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges
          git diff --staged --quiet || git commit -m "chore: update test coverage badges"
          git push
